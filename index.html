<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Swing Coach</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .header { background: #1a1a1a; color: white; padding: 1.25rem 2rem; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; font-weight: 500; letter-spacing: -0.3px; }
  .header span { font-size: 13px; opacity: 0.5; }
  .container { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }
  .card { background: white; border-radius: 12px; border: 1px solid #e8e8e4; padding: 1.5rem; margin-bottom: 1rem; }
  .upload-zone { border: 1.5px dashed #ccc; border-radius: 10px; padding: 2.5rem; text-align: center; cursor: pointer; transition: all 0.15s; background: #fafaf8; }
  .upload-zone:hover { border-color: #888; background: #f0f0eb; }
  .upload-zone svg { width: 36px; height: 36px; stroke: #aaa; margin-bottom: 12px; }
  .upload-zone p { font-size: 15px; color: #555; }
  .upload-zone small { font-size: 13px; color: #aaa; margin-top: 4px; display: block; }
  #fileInput { display: none; }
  .preview { display: none; margin-bottom: 1rem; }
  .preview video { width: 100%; border-radius: 10px; border: 1px solid #e8e8e4; max-height: 400px; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .chip { padding: 7px 14px; border-radius: 99px; font-size: 13px; border: 1px solid #ddd; cursor: pointer; color: #555; background: white; transition: all 0.1s; }
  .chip.active { border-color: #1a1a1a; color: #1a1a1a; background: #f0f0eb; font-weight: 500; }
  .label { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 10px; }
  .btn { width: 100%; padding: 13px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: #1a1a1a; color: white; }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-secondary { background: white; color: #1a1a1a; border: 1px solid #ddd; margin-top: 8px; }
  .btn-secondary:hover { background: #f5f5f0; }
  .loading { display: none; text-align: center; padding: 2rem; color: #888; font-size: 14px; }
  .spinner { width: 24px; height: 24px; border: 2px solid #eee; border-top-color: #888; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { display: none; background: #fff0ee; border: 1px solid #fcc; border-radius: 8px; padding: 12px 16px; font-size: 14px; color: #c0392b; margin-bottom: 1rem; }
  .result { display: none; }
  .summary-box { background: #f8f8f4; border-radius: 8px; padding: 14px 16px; font-size: 15px; line-height: 1.6; color: #1a1a1a; font-weight: 500; margin-bottom: 1rem; }
  .score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
  .score-tile { background: #f8f8f4; border-radius: 8px; padding: 12px; text-align: center; }
  .score-tile .slbl { font-size: 11px; color: #999; margin-bottom: 4px; }
  .score-tile .sval { font-size: 22px; font-weight: 600; }
  .good { color: #1a9e75; } .ok { color: #c07810; } .bad { color: #d04030; }
  .section-title { font-size: 14px; font-weight: 600; color: #1a1a1a; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .root-cause { background: #fff5f0; border-left: 3px solid #d04030; border-radius: 0 8px 8px 0; padding: 12px 14px; font-size: 14px; color: #333; line-height: 1.6; margin-bottom: 1rem; }
  .prio-list { list-style: none; }
  .prio-item { display: flex; gap: 12px; padding: 11px 0; border-bottom: 1px solid #f0f0eb; }
  .prio-item:last-child { border-bottom: none; }
  .prio-num { min-width: 24px; height: 24px; border-radius: 50%; background: #f0f0eb; font-size: 12px; font-weight: 600; color: #888; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .prio-area { font-weight: 600; font-size: 14px; }
  .prio-issue { font-size: 14px; color: #444; margin-top: 2px; line-height: 1.5; }
  .prio-fix { font-size: 13px; color: #888; margin-top: 5px; line-height: 1.5; }
  .prio-fix::before { content: "→ "; }
  .pos-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0eb; font-size: 14px; color: #333; align-items: flex-start; line-height: 1.5; }
  .pos-item:last-child { border-bottom: none; }
  .check { color: #1a9e75; font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .drill-box { background: #f0f8f4; border-radius: 8px; padding: 14px 16px; font-size: 14px; color: #333; line-height: 1.6; }
  @media (max-width: 480px) { .score-grid { grid-template-columns: repeat(2, 1fr); } .container { padding: 1rem; } }
</style>
</head>
<body>

<div class="header">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
  <h1>Golf Swing Coach</h1>
  <span>AI-driven analys</span>
</div>

<div class="container">

  <div class="card" id="uploadCard">
    <div class="label">Ladda upp video</div>
    <div class="upload-zone" id="uploadZone">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l-4 4m0 0l-4-4m4 4V3m0 18H5a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v14a2 2 0 01-2 2h-4"/></svg>
      <p>Klicka för att välja video</p>
      <small>MP4, MOV, WebM — max 100MB</small>
    </div>
    <input type="file" id="fileInput" accept="video/*">
  </div>

  <div class="preview" id="preview">
    <video id="videoEl" controls playsinline></video>
  </div>

  <div class="card" id="optionsCard" style="display:none">
    <div class="label">Fokusområde</div>
    <div class="chips" id="chips">
      <div class="chip active" data-val="full">Hela swinget</div>
      <div class="chip" data-val="setup">Setup</div>
      <div class="chip" data-val="backswing">Backswing</div>
      <div class="chip" data-val="downswing">Nedsvingen</div>
      <div class="chip" data-val="impact">Impact</div>
      <div class="chip" data-val="followthrough">Follow-through</div>
    </div>
    <button class="btn btn-primary" id="analyzeBtn">Analysera swing</button>
    <button class="btn btn-secondary" id="resetBtn">Byt video</button>
  </div>

  <div class="error" id="errorMsg"></div>
  <div class="loading" id="loading"><div class="spinner"></div><span id="loadingText">Extraherar frames...</span></div>

  <div class="result" id="result"></div>

</div>

<script>
const COACHING_DOC = `Golf Swing Coaching Philosophy & Framework

The Priority Order
The swing is built from the entire body, where different parts take different priorities in a specific order: setup, weight shift between the feet, lower body, upper body (excluding arms), arms, and lastly the hands and club.
I always start my assessment from the beginning of this order — checking the setup first, then working through to the club. If there is a problem in the arm movement there will almost always be a problem earlier in the order creating it — most commonly lower body timing. By working this way the fundamentals fall into place faster, and you often solve two problems at once by fixing the root cause that created the secondary problem.

The Swing as a Waltz — Effortless Power
The swing should flow like a waltz — beginning with the weight shift, followed by the lower body, then continuing through the priority order. When executed correctly the club arrives like a whip, producing effortless power.
Keep the arms in front of the body throughout the entire swing. They should only move vertically relative to the upper body.
Straighten the left leg and left arm at impact.

The Backswing
Start with a 50/50 weight split at address. Shift to 60/40 favoring the right foot during the backswing.
Just before the top begin shifting weight aggressively back to the left.
At impact, straighten the left leg from the heel as fast and aggressively as possible.
At the top: hips rotated minimum 45 degrees, shoulders minimum 90 degrees (ideally 100-110), 1:2 ratio between hip and shoulder rotation.
Arms in front of the upper body, right arm bent, left arm straight.

Setup — Down the Line
Slightly bent knees, weight mid-foot or slightly toward heels, hip pushed back, upper body tilted forward from hips, lower back straight, arms hang straight down, club sits flat.

Setup — Face On
Feet just outside shoulder width, left foot ~15 deg open, right foot 5-10 deg open, arms form small Y shape with hands pressed forward toward the target, hip closest to target slightly higher creating small spine tilt away from target.

Impact Position
Hips ~45 degrees open. Weight clearly on left foot. Body forms reverse K shape. Hands visibly ahead of clubhead. Left arm dominant through impact.

Common Faults
Fault 1: Too upright posture — causes over the top, inconsistent contact
Fault 2: No forward press of hands — causes scooping, weak high ball flight
Fault 3: No weight shift trigger — breaks waltz rhythm, passive lower body
Fault 4: Takeaway too inside/outside — mirrors in downswing, causes pulls or blocks
Fault 5: Right elbow falling to ribcage — causes getting stuck or coming over the top
Fault 6: Across the line or laid off at top — consequence of elbow/takeaway faults
Fault 7: Insufficient weight transfer to left — fat contact, scooping, weak ball flight
Fault 8: Coming over the top — outside-in path, slice or pull
Fault 9: Getting stuck — hook or blocked push right
Fault 10: Early extension — hips thrust toward ball, standing up through impact, heel strikes
Fault 11: Left arm falling to left ribcage in follow-through — hook, right arm dominance`;

const SYSTEM_PROMPT = `You are an expert golf swing coach. You analyze golf swing videos using the following coaching philosophy and framework.

${COACHING_DOC}

ANALYSIS RULES:
- Always work through the priority order: setup → weight shift → lower body → upper body → arms → hands/club
- A problem later in the order almost always has a root cause earlier — find and fix the root cause
- Be specific and actionable — not generic

Return ONLY valid JSON, no markdown, no preamble:
{
  "summary": "One sentence overall assessment in Swedish",
  "scores": {
    "setup": {"score": 1-10, "label": "Bra/Behöver arbete/Åtgärda först"},
    "weight_shift": {"score": 1-10, "label": "..."},
    "lower_body": {"score": 1-10, "label": "..."},
    "upper_body": {"score": 1-10, "label": "..."},
    "arms": {"score": 1-10, "label": "..."},
    "hands": {"score": 1-10, "label": "..."}
  },
  "root_cause": "The single most important fix — the root cause in the priority order (in Swedish)",
  "priorities": [
    {"order": 1, "area": "area name in Swedish", "issue": "specific issue in Swedish", "fix": "concrete actionable fix in Swedish"},
    {"order": 2, "area": "...", "issue": "...", "fix": "..."},
    {"order": 3, "area": "...", "issue": "...", "fix": "..."}
  ],
  "positives": ["positive in Swedish", "positive in Swedish"],
  "drill": "One specific drill in Swedish to address the root cause"
}`;

let videoFile = null;
let selectedFocus = 'full';

document.getElementById('uploadZone').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 104857600) { showError('Videon är för stor. Max 100MB.'); return; }
  videoFile = file;
  const url = URL.createObjectURL(file);
  document.getElementById('videoEl').src = url;
  document.getElementById('preview').style.display = 'block';
  document.getElementById('uploadCard').style.display = 'none';
  document.getElementById('optionsCard').style.display = 'block';
  hideError();
};

document.querySelectorAll('.chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    selectedFocus = c.dataset.val;
  };
});

document.getElementById('resetBtn').onclick = () => {
  videoFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('videoEl').src = '';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('uploadCard').style.display = 'block';
  document.getElementById('optionsCard').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('result').innerHTML = '';
  hideError();
};

document.getElementById('analyzeBtn').onclick = analyzeSwing;

function showError(msg) { const e = document.getElementById('errorMsg'); e.textContent = msg; e.style.display = 'block'; }
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
function setLoading(text) { document.getElementById('loadingText').textContent = text; document.getElementById('loading').style.display = 'block'; }
function hideLoading() { document.getElementById('loading').style.display = 'none'; }

async function extractFrames(file, n = 8) {
  return new Promise((resolve, reject) => {
    const video = document.createElement('video');
    video.src = URL.createObjectURL(file);
    video.muted = true;
    video.onloadedmetadata = () => {
      const dur = video.duration;
      const times = Array.from({length: n}, (_, i) => (dur / (n - 1)) * i);
      const frames = [];
      let idx = 0;
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      function next() {
        if (idx >= times.length) { resolve(frames); return; }
        video.currentTime = times[idx];
      }
      video.onseeked = () => {
        canvas.width = Math.min(video.videoWidth, 720);
        canvas.height = Math.round(video.videoHeight * canvas.width / video.videoWidth);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        frames.push(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
        idx++;
        next();
      };
      video.onerror = reject;
      next();
    };
    video.onerror = reject;
  });
}

function scoreClass(s) { return s >= 8 ? 'good' : s >= 6 ? 'ok' : 'bad'; }

function renderResult(data) {
  const scoreLabels = { setup: 'Setup', weight_shift: 'Viktsförflyttning', lower_body: 'Underkropp', upper_body: 'Överkropp', arms: 'Armar', hands: 'Händer/Klubba' };
  let html = '';
  html += `<div class="card"><div class="summary-box">${data.summary}</div>`;
  html += `<div class="score-grid">`;
  for (const [k, v] of Object.entries(data.scores)) {
    html += `<div class="score-tile"><div class="slbl">${scoreLabels[k] || k}</div><div class="sval ${scoreClass(v.score)}">${v.score}<span style="font-size:13px;font-weight:400">/10</span></div></div>`;
  }
  html += `</div></div>`;

  html += `<div class="card"><div class="section-title">⚠️ Rotorsak</div><div class="root-cause">${data.root_cause}</div>`;
  html += `<div class="section-title">Åtgärda i prioritetsordning</div><ul class="prio-list">`;
  data.priorities.forEach(p => {
    html += `<li class="prio-item"><span class="prio-num">${p.order}</span><div><div class="prio-area">${p.area}</div><div class="prio-issue">${p.issue}</div><div class="prio-fix">${p.fix}</div></div></li>`;
  });
  html += `</ul></div>`;

  if (data.positives?.length) {
    html += `<div class="card"><div class="section-title">✅ Det som fungerar bra</div>`;
    data.positives.forEach(p => { html += `<div class="pos-item"><span class="check">✓</span>${p}</div>`; });
    html += `</div>`;
  }

  html += `<div class="card"><div class="section-title">🎯 Övning att träna</div><div class="drill-box">${data.drill}</div></div>`;

  const result = document.getElementById('result');
  result.innerHTML = html;
  result.style.display = 'block';
  result.scrollIntoView({ behavior: 'smooth' });
}

async function analyzeSwing() {
  if (!videoFile) return;
  hideError();
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('result').style.display = 'none';

  try {
    setLoading('Extraherar frames från video...');
    const frames = await extractFrames(videoFile, 8);

    setLoading('Skickar till AI-coach...');
    const focusNote = selectedFocus !== 'full' ? ` Fokusera extra på ${selectedFocus}-fasen.` : '';
    const userPrompt = `Analysera detta golfsving.${focusNote} Jag har bifogat ${frames.length} frames jämnt fördelade genom swinget. Använd prioritetsordningens coachningsmetodik och returnera din analys som JSON.`;

    const contents = [
      ...frames.map(f => ({ inlineData: { mimeType: 'image/jpeg', data: f } })),
      { text: userPrompt }
    ];

    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: SYSTEM_PROMPT, contents })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error || 'API-fel');
    }

    const result = await response.json();
    const text = result.text.replace(/```json|```/g, '').trim();
    const data = JSON.parse(text);

    hideLoading();
    renderResult(data);
  } catch (err) {
    hideLoading();
    showError('Analys misslyckades: ' + err.message);
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
  }
}
</script>
</body>
</html>
