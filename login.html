<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logga in — PureAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--green-dark:#1e4d2b;--green:#2a6636;--green-mid:#3a8a4a;--green-light:#e8f5ec;--green-pale:#f2faf4;--white:#ffffff;--dark:#111c14;--text:#2c3e30;--muted:#6b7e6e;--border:#dde8df;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Inter',sans-serif;background:var(--green-pale);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh;}

  nav{display:flex;align-items:center;justify-content:center;padding:0 2rem;height:64px;background:var(--white);border-bottom:1px solid var(--border);}

  .page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}

  .card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:2.5rem;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(30,77,43,0.08);}

  .card-title{font-size:1.4rem;font-weight:600;color:var(--dark);margin-bottom:0.4rem;letter-spacing:-0.3px;}
  .card-sub{font-size:14px;color:var(--muted);margin-bottom:2rem;font-weight:300;}

  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:2rem;}
  .tab{flex:1;padding:0.8rem;text-align:center;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;margin-bottom:-1px;}
  .tab.active{color:var(--green-dark);border-bottom-color:var(--green-dark);}

  .form-group{margin-bottom:1.2rem;}
  label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px;}
  input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;color:var(--dark);background:var(--white);transition:border-color 0.2s;outline:none;}
  input:focus{border-color:var(--green);}
  input::placeholder{color:#b0c4b4;}

  .btn{width:100%;padding:13px;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;border:none;transition:all 0.2s;font-family:inherit;}
  .btn-primary{background:var(--green-dark);color:white;margin-top:0.5rem;}
  .btn-primary:hover{background:var(--green);}
  .btn-primary:disabled{background:#ccc;cursor:not-allowed;}

  .divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--muted);font-size:13px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

  .error{display:none;background:#fff0ee;border:1px solid #fcc;border-radius:8px;padding:10px 14px;font-size:13px;color:#c0392b;margin-bottom:1rem;}
  .success{display:none;background:var(--green-light);border:1px solid #b2d8be;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--green-dark);margin-bottom:1rem;}

  .footer-note{text-align:center;font-size:13px;color:var(--muted);margin-top:1.5rem;}
  .footer-note a{color:var(--green);text-decoration:none;}

  .back-link{display:block;text-align:center;font-size:13px;color:var(--muted);margin-top:1.2rem;text-decoration:none;}
  .back-link:hover{color:var(--green);}

  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<nav>
  <a href="/" style="text-decoration:none;display:flex;align-items:center;">
    <svg height="26" viewBox="0 0 195 52" xmlns="http://www.w3.org/2000/svg">
      <text y="42" style="font-family:'Inter',sans-serif;font-size:42px;letter-spacing:-2px;"><tspan style="font-weight:600;fill:#1e4d2b;">Pure</tspan><tspan style="font-weight:300;fill:#3a8a4a;">AI</tspan></text>
    </svg>
  </a>
</nav>

<div class="page">
  <div>
    <div class="card">
      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">Logga in</div>
        <div class="tab" id="tab-signup" onclick="switchTab('signup')">Skapa konto</div>
      </div>

      <div id="error" class="error"></div>
      <div id="success" class="success"></div>

      <!-- LOGIN FORM -->
      <div id="form-login">
        <div class="form-group">
          <label for="login-email">E-postadress</label>
          <input type="email" id="login-email" placeholder="din@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Lösenord</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" id="btn-login" onclick="handleLogin()">Logga in</button>
        <div class="footer-note" style="margin-top:1rem;">
          <a href="#" onclick="showForgot()">Glömt lösenordet?</a>
        </div>
      </div>

      <!-- SIGNUP FORM -->
      <div id="form-signup" style="display:none;">
        <div class="form-group">
          <label for="signup-email">E-postadress</label>
          <input type="email" id="signup-email" placeholder="din@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signup-password">Välj lösenord</label>
          <input type="password" id="signup-password" placeholder="Minst 8 tecken" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="signup-password2">Bekräfta lösenord</label>
          <input type="password" id="signup-password2" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button class="btn btn-primary" id="btn-signup" onclick="handleSignup()">Skapa konto</button>
        <div class="footer-note" style="margin-top:1rem;font-size:12px;">
          Genom att skapa ett konto godkänner du våra <a href="/terms.html">användarvillkor</a> och <a href="/privacy.html">integritetspolicy</a>.
        </div>
      </div>

      <!-- FORGOT PASSWORD FORM -->
      <div id="form-forgot" style="display:none;">
        <p style="font-size:14px;color:var(--muted);margin-bottom:1.2rem;font-weight:300;">Ange din e-postadress så skickar vi en länk för att återställa lösenordet.</p>
        <div class="form-group">
          <label for="forgot-email">E-postadress</label>
          <input type="email" id="forgot-email" placeholder="din@email.com">
        </div>
        <button class="btn btn-primary" id="btn-forgot" onclick="handleForgot()">Skicka återställningslänk</button>
        <div class="footer-note" style="margin-top:1rem;">
          <a href="#" onclick="switchTab('login')">← Tillbaka till inloggning</a>
        </div>
      </div>
    </div>

    <a class="back-link" href="/">← Tillbaka till startsidan</a>
  </div>
</div>


<script>
  const SUPABASE_URL = 'https://sdhfmyrsixrcyyrlthjc.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_DCl-Xh9ryUP9346TDlHJhw_tE2hG3hx';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function switchTab(tab) {
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('form-forgot').style.display = 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    hideMessages();
  }

  function showForgot() {
    document.getElementById('form-login').style.display = 'none';
    document.getElementById('form-forgot').style.display = 'block';
    document.getElementById('tab-login').classList.remove('active');
    hideMessages();
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('success').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('success');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('error').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('error').style.display = 'none';
    document.getElementById('success').style.display = 'none';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span>Vänta...' : btn.getAttribute('data-text');
  }

  // Set default button texts
  document.getElementById('btn-login').setAttribute('data-text', 'Logga in');
  document.getElementById('btn-signup').setAttribute('data-text', 'Skapa konto');
  document.getElementById('btn-forgot').setAttribute('data-text', 'Skicka återställningslänk');

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showError('Fyll i e-post och lösenord.'); return; }
    setLoading('btn-login', true);
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      showError('Fel e-post eller lösenord. Försök igen.');
      setLoading('btn-login', false);
    } else {
      window.location.href = '/index.html';
    }
  }

  async function handleSignup() {
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const password2 = document.getElementById('signup-password2').value;
    if (!email || !password) { showError('Fyll i alla fält.'); return; }
    if (password.length < 8) { showError('Lösenordet måste vara minst 8 tecken.'); return; }
    if (password !== password2) { showError('Lösenorden matchar inte.'); return; }
    setLoading('btn-signup', true);
    const { error } = await supabase.auth.signUp({ email, password });
    if (error) {
      showError('Kunde inte skapa konto: ' + error.message);
      setLoading('btn-signup', false);
    } else {
      showSuccess('Konto skapat! Kolla din e-post för att verifiera din adress.');
      setLoading('btn-signup', false);
    }
  }

  async function handleForgot() {
    const email = document.getElementById('forgot-email').value.trim();
    if (!email) { showError('Ange din e-postadress.'); return; }
    setLoading('btn-forgot', true);
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://getpureai.se/reset-password'
    });
    if (error) {
      showError('Kunde inte skicka återställningslänk.');
    } else {
      showSuccess('Återställningslänk skickad! Kolla din e-post.');
    }
    setLoading('btn-forgot', false);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('form-login').style.display !== 'none') handleLogin();
      else if (document.getElementById('form-signup').style.display !== 'none') handleSignup();
      else if (document.getElementById('form-forgot').style.display !== 'none') handleForgot();
    }
  });

  // Redirect if already logged in
  supabase.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = '/index.html';
  });
</script>
</body>
</html>
